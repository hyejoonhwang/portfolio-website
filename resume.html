    <title>Resume — Summer</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        .resume-page {
            height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
        }

        .resume-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
            border-radius: 4px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        .resume-download {
            display: inline-block;
            margin-top: 24px;
            font-family: 'General Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
            transition: color 0.3s ease;
        }

        .resume-download:hover {
            color: var(--text);
        }
    </style>
</head>

    <nav>

        <img src="images/resume-1.png" alt="Summer Hwang Resume" class="resume-img">
    </div>

    <script src="cutout.js"></script>
